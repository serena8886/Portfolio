<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yisi Xie — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

:root {
  --bg:     #f7f6f4;
  --white:  #ffffff;
  --ink:    #1a1a1a;
  --warm:   #3d3830;
  --muted:  rgba(30,25,20,0.38);
  --border: rgba(0,0,0,0.08);
}

body {
  background: var(--bg);
  font-family: 'Jost', sans-serif;
  color: var(--ink);
  overflow-x: hidden;
}

/* ════════════════════════════════
   NAV — shared across all pages
   ════════════════════════════════ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  padding: clamp(18px,3vh,28px) clamp(24px,4vw,52px);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 400;
  letter-spacing: .04em;
  color: var(--ink);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 28px;
  align-items: center;
}

.nav-links a {
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'Jost', sans-serif;
}
.nav-links a:hover,
.nav-links a.active { color: var(--ink); }

/* ════════════════════════════════
   HERO
   ════════════════════════════════ */
#hero {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(80px,12vh,120px) clamp(24px,6vw,80px) clamp(48px,8vh,80px);
  gap: clamp(16px,2.5vh,24px);
}

.polaroid {
  background: var(--white);
  padding: 16px;
  box-shadow:
    0 6px 20px rgba(0,0,0,0.09),
    0 20px 56px rgba(0,0,0,0.13),
    0 40px 80px rgba(0,0,0,0.07);
}

.artwork-wrap {
  width: clamp(280px, 72vmin, 760px);
  height: clamp(280px, 72vmin, 760px);
  overflow: hidden;
  position: relative;
}

.artwork-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: contrast(1.1) brightness(0.95);
}

.artwork-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  background-image:
    radial-gradient(circle, rgba(0,0,0,0.20) 0.5px, transparent 0.5px),
    radial-gradient(circle, rgba(0,0,0,0.10) 0.5px, transparent 0.5px);
  background-size: 2px 2px, 2px 2px;
  background-position: 0 0, 1px 1px;
  mix-blend-mode: multiply;
}

.wuhan-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 4vmin, 44px);
  font-weight: 300;
  letter-spacing: .06em;
  color: var(--ink);
  text-align: center;
}

/* ════════════════════════════════
   ABOUT
   ════════════════════════════════ */
#about {
  min-height: 100svh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--border);
}

@media (max-width: 720px) {
  #about { grid-template-columns: 1fr; }
}

/* Left — text */
.about-left {
  padding: clamp(64px,10vh,100px) clamp(40px,5vw,72px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0;
  border-right: 1px solid var(--border);
}

@media (max-width: 720px) {
  .about-left { border-right: none; border-bottom: 1px solid var(--border); }
}

/* Fade-in lines */
.fade-line {
  opacity: 0;
  transform: translateY(14px);
  transition: opacity .6s ease, transform .6s ease;
}
.fade-line.visible {
  opacity: 1;
  transform: translateY(0);
}

.about-tag {
  font-size: 9px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 32px;
}

.about-heading {
  font-family: 'Jost', sans-serif;
  font-size: clamp(36px, 4.5vw, 58px);
  font-weight: 900;
  line-height: 1.05;
  color: #6ECAAA;
  margin-bottom: 28px;
  letter-spacing: -.02em;
}

.about-body {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 400;
  line-height: 1.9;
  color: var(--ink);
  max-width: 420px;
  margin-bottom: 40px;
}

.skills-label {
  font-size: 9px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: #5a5a5a;
  margin-bottom: 16px;
}

.skills-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 48px;
}

.skill-tag {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: .12em;
  color: var(--ink);
  border: 1px solid rgba(0,0,0,0.18);
  padding: 5px 12px;
}

/* Social icons */
.social-row {
  display: flex;
  gap: 20px;
  align-items: center;
}

.social-icon {
  color: #6ECAAA;
  transition: color .2s;
  display: flex;
  align-items: center;
  text-decoration: none;
}
.social-icon:hover { color: var(--ink); }
.social-icon svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
}

/* Right — photo */
.about-right {
  position: relative;
  overflow: hidden;
  min-height: 520px;
  padding: clamp(24px,4vw,48px);
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo-wrap {
  position: relative;
  width: 100%;
  max-width: 532px;   /* 380 × 1.4 */
}

.about-right img {
  width: 100%;
  height: auto;
  max-height: 728px;
  object-fit: cover;
  object-position: center top;
  filter: contrast(1.08) brightness(0.97);
  display: block;
}

/* Dither overlay on photo */
.photo-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle, rgba(0,0,0,0.18) 0.5px, transparent 0.5px),
    radial-gradient(circle, rgba(0,0,0,0.09) 0.5px, transparent 0.5px);
  background-size: 2px 2px, 2px 2px;
  background-position: 0 0, 1px 1px;
  mix-blend-mode: multiply;
}

/* ════════════════════════════════
   CONTACT OVERLAY
   ════════════════════════════════ */
#contact-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
  background: var(--bg);
  overflow-y: auto;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(80px,12vh,120px) clamp(24px,6vw,80px) clamp(48px,8vh,80px);
}
#contact-overlay.open { display: flex; }

.contact-close {
  position: fixed;
  top: clamp(18px,3vh,28px);
  right: clamp(24px,4vw,52px);
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Jost', sans-serif;
  transition: color .2s;
  z-index: 310;
}
.contact-close:hover { color: var(--ink); }

.contact-label {
  font-size: 9px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: #5a5a5a;
  margin-bottom: 16px;
}

.contact-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px,4vw,52px);
  font-weight: 300;
  color: var(--ink);
  margin-bottom: clamp(40px,6vh,64px);
  text-align: center;
}

.contact-form {
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-group label {
  font-size: 11px;
  font-weight: 300;
  letter-spacing: .12em;
  color: var(--ink);
}
.form-group label span { color: var(--muted); }

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 14px 16px;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--ink);
  background: transparent;
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 0;
  outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
}
.form-group input::placeholder,
.form-group textarea::placeholder { color: rgba(0,0,0,0.22); }
.form-group input:focus,
.form-group textarea:focus { border-color: rgba(0,0,0,0.4); }
.form-group textarea { height: 180px; resize: vertical; }

.form-submit { display: flex; justify-content: center; margin-top: 8px; }

.submit-btn {
  font-family: 'Jost', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--ink);
  background: transparent;
  border: 1px solid rgba(0,0,0,0.25);
  padding: 14px 48px;
  cursor: pointer;
  transition: background .2s, color .2s, border-color .2s;
}
.submit-btn:hover {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
</style>
</head>
<body>

<!-- ── Nav ────────────────────────────────────────────── -->
<nav>
  <a href="index.html" class="nav-logo">Yisi Xie</a>
  <div class="nav-links">
    <a href="#hero">Home</a>
    <a href="#about">About Me</a>

    <a onclick="openContact(); return false;" href="#">Contact</a>

<!-- ── Hero ───────────────────────────────────────────── -->

<script>
/* ── Contact overlay ── */
function openContact() {
  document.getElementById('contact-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeContact() {
  document.getElementById('contact-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeContact();
});

// Open contact if redirected from another page
if (sessionStorage.getItem('openContact') === '1') {
  sessionStorage.removeItem('openContact');
  openContact();
}

/* ── Fade-in on scroll (IntersectionObserver) ── */
const lines = document.querySelectorAll('.fade-line');
const observer = new IntersectionObserver(entries => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      // Stagger each line by its index among siblings
      const siblings = [...entry.target.parentElement.querySelectorAll('.fade-line'),
                        ...document.querySelectorAll('.skills-row .fade-line')];
      const allLines = document.querySelectorAll('.fade-line');
      const idx = [...allLines].indexOf(entry.target);
      setTimeout(() => {
        entry.target.classList.add('visible');
      }, idx * 80);
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.15 });

lines.forEach(el => observer.observe(el));
</script>
